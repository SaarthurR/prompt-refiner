<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Prompt Refiner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #1a1915;
      color: #e8e0d5;
      font-family: 'Georgia', serif;
      padding: 0;
    }
    .header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid #2e2c28;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #d4a574, #c4956a);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 17px; height: 17px; fill: white; }
    .title { font-size: 14px; font-weight: 600; color: #e8e0d5; }
    .subtitle { font-size: 11px; color: #6b5e52; font-style: italic; margin-top: 2px; }
    .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
    .info-box {
      background: #222019; border: 1px solid #2e2c28; border-radius: 9px;
      padding: 13px; font-size: 12.5px; line-height: 1.6; color: #a89880;
    }
    .info-box strong { color: #d4a574; font-weight: 500; }
    .open-btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #d4a574 0%, #c4956a 100%);
      border: none; border-radius: 9px; color: white;
      font-size: 13.5px; font-weight: 600; cursor: pointer;
      font-family: 'Georgia', serif; transition: opacity 0.2s;
    }
    .open-btn:hover:not(:disabled) { opacity: 0.88; }
    .open-btn:disabled { opacity: 0.45; cursor: default; }
    .sites { display: flex; flex-wrap: wrap; gap: 5px; }
    .site-chip {
      padding: 3px 9px; background: #222019; border: 1px solid #2e2c28;
      border-radius: 100px; font-size: 11px; color: #6b5e52;
    }
    #status-msg { font-size: 11.5px; color: #8a7d6e; font-style: italic; min-height: 16px; }
    .footer {
      padding: 10px 18px; border-top: 1px solid #2e2c28;
      font-size: 10.5px; color: #4a4038; text-align: center; font-style: italic;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <div>
      <div class="title">Prompt Refiner</div>
      <div class="subtitle">Powered by Groq · Llama 3.3</div>
    </div>
  </div>
  <div class="body">
    <div class="info-box">
      Click below to open the sidebar on the current page. The <strong>✦ star button</strong> will appear bottom-right on any supported AI site.
    </div>
    <div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#6b5e52;margin-bottom:7px;">Supported Sites</div>
      <div class="sites">
        <span class="site-chip">ChatGPT</span>
        <span class="site-chip">Claude</span>
        <span class="site-chip">Gemini</span>
        <span class="site-chip">Grok</span>
        <span class="site-chip">Perplexity</span>
        <span class="site-chip">DeepSeek</span>
      </div>
    </div>
    <div id="status-msg"></div>
    <button class="open-btn" id="open-sidebar-btn">Open Sidebar on This Page</button>
  </div>
  <div class="footer">Your Groq key is stored locally · Never shared</div>
  <script src="popup.js"></script>
</body>
</html>
